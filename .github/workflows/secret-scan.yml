name: Secret Scan

# Runs gitleaks directly from the upstream release binary rather than the
# gitleaks-action wrapper — the wrapper requires a paid license for GitHub
# organizations. The CLI binary has no such gate.
#
# Scan scope is intentionally narrow: only new commits being proposed.
# - Pull requests: scan commits in the PR diff (base..head)
# - Push to main: scan commits in the push (before..after)
# This matches the gitleaks-action default and keeps the check focused on
# what THIS change introduces, not every example value sitting in the repo's
# history.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          VERSION=8.18.4
          curl -sSfL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          ./gitleaks version

      - name: Scan PR diff
        if: github.event_name == 'pull_request'
        run: |
          ./gitleaks detect --source . --no-banner --redact --verbose \
            --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"

      - name: Scan push delta
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"
          ZERO="0000000000000000000000000000000000000000"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "$ZERO" ]; then
            # Branch creation — no prior commit to diff against.
            ./gitleaks detect --source . --no-banner --redact --verbose
          else
            ./gitleaks detect --source . --no-banner --redact --verbose \
              --log-opts="${BEFORE}..${AFTER}"
          fi
