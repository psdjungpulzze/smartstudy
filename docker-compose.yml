services:
  # =============================================================================
  # Development Database
  # =============================================================================
  postgres_dev:
    image: postgres:15-alpine
    container_name: study_smart_postgres_dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: study_smart_dev
    ports:
      - "5448:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # =============================================================================
  # Test Database (uses tmpfs for speed, no persistence)
  # =============================================================================
  postgres_test:
    image: postgres:15-alpine
    container_name: study_smart_postgres_test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: study_smart_test
    ports:
      - "5449:5432"
    tmpfs:
      - /var/lib/postgresql/data

volumes:
  postgres_dev_data:
