<!DOCTYPE html>
<html>
<head><title>SAT Math Practice - VarsityTutors</title></head>
<body>
<div class="question-container">
  <div class="question-text">
    If $f(x) = 2x^2 - 3x + 1$, what is $f(3)$?
  </div>
  <ul>
    <li class="answer-choice correct-answer">10</li>
    <li class="answer-choice">7</li>
    <li class="answer-choice">14</li>
    <li class="answer-choice">4</li>
  </ul>
  <div class="explanation">
    Substitute $x = 3$: $f(3) = 2(9) - 3(3) + 1 = 18 - 9 + 1 = 10$.
  </div>
</div>

<div class="question-container">
  <div class="question-text">
    What is the slope of the line passing through $(1, 2)$ and $(3, 8)$?
  </div>
  <ul>
    <li class="answer-choice correct-answer">3</li>
    <li class="answer-choice">2</li>
    <li class="answer-choice">6</li>
    <li class="answer-choice">4</li>
  </ul>
  <div class="explanation">
    Slope = $(8 - 2) / (3 - 1) = 6 / 2 = 3$.
  </div>
</div>
</body>
</html>
